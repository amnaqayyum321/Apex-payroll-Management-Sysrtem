<div class="user-form-wrapper">
  <div class="user-card">
    <!-- Header -->
    <div class="card-header">
      <h3>{{ isEditMode ? 'Update Leave Entitlement' : 'Create Leave Entitlement' }}</h3>
      <button class="reset-btn" (click)="resetForm()">
        <i class="fa fa-refresh"></i> Reset
      </button>
    </div>

 
    <div class="header-divider"></div>

    <form class="user-form">

      <!-- Active Checkbox (right aligned) -->
      <div class="row">
        <div class="col-12 d-flex justify-content-end align-items-center gap-2">
          <label class="checkbox-container">
            Active
            <input
              type="checkbox"
              class="custom-checkbox"
              [(ngModel)]="active"
              name="active"
            />
            <span class="checkmark"></span>
          </label>
        </div>
      </div>

      <!-- Row 1: Employee, Leave Type, Total Leaves Per Year -->
      <div class="row">
        <!-- Employee custom dropdown -->
        <div class="col-md-4">
          <label class="form-label">Employee</label>
          <div class="custom-dropdown" (click)="toggleEmployeeDropdown($event)">
            <div class="dropdown-selected">
              <span>{{ selectedEmployeeDisplay || 'Select Employee' }}</span>
              <i class="fa-solid fa-caret-down" [class.rotate]="isEmployeeDropdownOpen"></i>
            </div>
            <div class="dropdown-options" *ngIf="isEmployeeDropdownOpen">
              <div
                class="dropdown-option"
                *ngFor="let emp of employees"
                (click)="selectEmployee(emp, $event)"
              >
                {{ emp.fullName }}
              </div>
            </div>
          </div>
        </div>

        <!-- Leave Type custom dropdown -->
        <div class="col-md-4">
          <label class="form-label">Leave Type</label>
          <div class="custom-dropdown" (click)="toggleLeaveTypeDropdown($event)">
            <div class="dropdown-selected">
              <span>{{ selectedLeaveTypeDisplay || 'Select Leave Type' }}</span>
              <i class="fa-solid fa-caret-down" [class.rotate]="isLeaveTypeDropdownOpen"></i>
            </div>
            <div class="dropdown-options" *ngIf="isLeaveTypeDropdownOpen">
              <div
                class="dropdown-option"
                *ngFor="let type of leaveTypes"
                (click)="selectLeaveType(type, $event)"
              >
                {{ type.name }}
              </div>
            </div>
          </div>
        </div>

        <!-- Total Leaves Per Year -->
        <div class="col-md-4">
          <label class="form-label">Total Leaves Per Year</label>
          <input
            type="number"
            class="form-control"
            [(ngModel)]="totalLeavesPerYear"
            name="totalLeavesPerYear"
            placeholder="Enter total leaves"
          />
        </div>
      </div>

      <!-- Row 2: Remarks (full width) -->
      <div class="row">
        <div class="col-md-12">
          <label class="form-label">Remarks</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="remarks"
            name="remarks"
            placeholder="Enter remarks"
          />
        </div>
      </div>

      <!-- Buttons -->
      <div class="form-actions">
        <button type="button" class="cancel-btn" (click)="cancel()">Cancel</button>
        <button
          type="button"
          class="submit-btn"
          (click)="isEditMode ? updateLeave() : createLeave()"
        >
          {{ isEditMode ? 'Update' : 'Create' }}
        </button>
      </div>

    </form>
  </div>
</div>
