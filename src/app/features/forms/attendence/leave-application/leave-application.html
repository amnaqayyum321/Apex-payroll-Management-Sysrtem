<div class="user-form-wrapper">
  <div class="user-card">
    <!-- Header -->
    <div class="card-header">
      <h3>{{ isEditMode ? 'Update leave-application' : 'Create leave-application' }}</h3>
    </div>
    <div class="header-divider"></div>

    <form class="user-form">
      <!-- <div class="row">
        <div class="col-12 d-flex justify-content-end align-items-center gap-2">
          <label class="checkbox-container">
            Active
            <input type="checkbox" class="custom-checkbox" [(ngModel)]="active" name="active" />
            <span class="checkmark"></span>
          </label>
        </div>
      </div> -->
      <!-- ROW 1 -->
    <!-- ROW 1 -->
<div class="row">
  <div class="col-md-4">
    <label class="form-label">Name</label>
    <input
      type="text"
      placeholder="Enter Name..."
      [(ngModel)]="name"
      class="form-control"
      name="name"
    />
  </div>

  <div class="col-md-4">
    <label class="form-label">Leave Type</label>
    <div class="custom-dropdown" (click)="toggleDropdown('leaveType', $event)">
      <div class="dropdown-selected">
        <span>{{ selectedLeaveTypeName || 'Select leave type' }}</span>
        <i class="fa-solid fa-caret-down" [class.rotate]="isLeaveTypeDropdownOpen"></i>
      </div>

      <div class="dropdown-options" *ngIf="isLeaveTypeDropdownOpen">
        <div
          class="dropdown-option"
          *ngFor="let leave of LeaveTypeList"
          (click)="selectLeaveType(leave, $event)"
        >
          {{ leave.name }}
        </div>
      </div>
    </div>
  </div>

  <div class="col-md-4">
    <label class="form-label">Employee</label>
    <div class="custom-dropdown" (click)="toggleDropdown('employee', $event)">
      <div class="dropdown-selected">
        <span>{{ selectedEmployeeName || 'Select employee' }}</span>
        <i class="fa-solid fa-caret-down" [class.rotate]="isEmployeeDropdownOpen"></i>
      </div>

      <div class="dropdown-options" *ngIf="isEmployeeDropdownOpen">
        <div
          class="dropdown-option"
          *ngFor="let emp of EmployeeList"
          (click)="selectEmployee(emp, $event)"
        >
          {{ emp.fullName }}
        </div>
      </div>
    </div>
  </div>
</div>
      <div class="row">
        <div class="col-md-6">
          <label class="form-label">Start Date </label>
          <input type="date" class="form-control" [(ngModel)]="fromDate" name="fromDate" />
        </div>
        <div class="col-md-6">
          <label class="form-label">End Date </label>
          <input type="date" class="form-control" [(ngModel)]="toDate" name="toDate" />
        </div>
      </div>
      <div class="row">
        <div class="col-md-12">
          <label class="form-label" for="remarks">Remarks</label>
          <textarea class="form-control" name="remarks" id="remarks" [(ngModel)]="remarks">
          </textarea>
        </div>
      </div>
      <!-- Footer buttons -->
      <div class="form-actions">
        <button type="button" class="cancel-btn" (click)="cancel()">Cancel</button>
        <button
          type="submit"
          class="submit-btn"
          (click)="isEditMode ? updateLeaveApplication() : createleaveapplication()"
        >
          {{ isEditMode ? 'Update' : 'Create' }}
        </button>
      </div>
    </form>
  </div>
</div>
