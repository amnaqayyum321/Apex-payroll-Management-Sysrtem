<div class="user-form-wrapper">
  <div class="user-card">
    <!-- Header -->
    <div class="card-header">
      <h3>{{ isEditMode ? 'Update Leaves Master Data' : 'Create New Leaves Master Data' }}</h3>
  
    </div>
    <div class="header-divider"></div>

    <form class="user-form">
      <div class="row">
       <div class="col-12 d-flex justify-content-end align-items-center gap-2">
          <label class="checkbox-container">
            Active
            <input
              type="checkbox"
              class="custom-checkbox"
              [(ngModel)]="active"
              name="active"
            />
            <span class="checkmark"></span>
          </label>
        </div>
      </div>
      <!-- ROW 1: Code & Leave Name -->
      <div class="row">
        <div class="col-md-6">
          <label class="form-label">Code</label>
          <input
            type="text"
            class="form-control"
            placeholder="Enter code"
            [(ngModel)]="code"
            name="code"
          />
        </div>
        <div class="col-md-6">
          <label class="form-label">Leave Name</label>
          <input
            type="text"
            class="form-control"
            placeholder="Enter leave name"
            [(ngModel)]="name"
            name="name"
          />
        </div>
      </div>

      <!-- ROW 2: Total Leaves & Max Leaves in Month -->
      <div class="row">
        <div class="col-md-6">
          <label class="form-label">Total Leaves</label>
          <input
            type="number"
            class="form-control"
            placeholder="Enter total leaves"
            [(ngModel)]="totalLeavesPerYear"
            name="totalLeavesPerYear"
            min="0"
          />
        </div>
        <div class="col-md-6">
          <label class="form-label">Max Leaves in Month</label>
          <input
            type="number"
            class="form-control"
            placeholder="Enter max leaves in month"
            [(ngModel)]="maxLeaveApplyInMonth"
            name="maxLeaveApplyInMonth"
            min="0"
          />
        </div>
      </div>

      <!-- ROW 3: Checkboxes -->
      <div class="row">
      <div class="col-2 d-flex justify-content-end align-items-center gap-2">
          <label class="checkbox-container">
            Carry Forward
            <input
              type="checkbox"
              class="custom-checkbox"
              [(ngModel)]="isCarryForward"
              name="active"
            />
            <span class="checkmark"></span>
          </label>
        </div>
         <div class="col-2 d-flex justify-content-end align-items-center gap-2">
          <label class="checkbox-container">
            Encashable
            <input
              type="checkbox"
              class="custom-checkbox"
              [(ngModel)]="isEncashable"
              name="active"
            />
            <span class="checkmark"></span>
          </label>
        </div>
      </div>

      <!-- ROW 4: Remarks -->
      <div class="row">
        <div class="col-12">
          <label class="form-label">Remarks</label>
          <textarea
            class="form-control"
            placeholder="Enter your feedback and remarks here..."
            [(ngModel)]="remarks"
            name="remarks"
            rows="4"
          ></textarea>
        </div>
      </div>

      <!-- Footer buttons -->
      <div class="form-actions">
        <button type="button" class="cancel-btn" (click)="cancel()">Cancel</button>
        <button
          type="submit"
          class="submit-btn"
          [disabled]="disabled"
          (click)="isEditMode ? updateLeave() : createLeave()"
        >
          {{ isEditMode ? 'Update' : 'Create' }}
        </button>
      </div>
    </form>
  </div>
</div>
