<div class="user-form-wrapper">
  <div class="user-card">
    <div class="card-header">
      <h3>{{ isEditMode ? 'Update Project' : 'Create Project' }}</h3>
    </div>
    <div class="header-divider"></div>

    <form class="user-form">
      <!-- Active toggle (as a form-group with checkbox) -->
      <div class="col-12 d-flex justify-content-end align-items-center gap-2">
          <label class="checkbox-container">
            Active
            <input type="checkbox" class="custom-checkbox" [(ngModel)]="status" name="active" />
            <span class="checkmark"></span>
          </label>
        </div>

      <!-- Main grid for fields -->
      <div class="form-grid">
        <!-- Code -->
        <div class="form-group">
          <label>Code</label>
          <input
            type="text"
            placeholder="Enter Code..."
            [(ngModel)]="Code"
            name="Code"
          />
        </div>

        <!-- Name -->
        <div class="form-group">
          <label>Name</label>
          <input
            type="text"
            placeholder="Enter Name..."
            [(ngModel)]="Name"
            name="Name"
          />
        </div>

        <!-- Manager Type (custom dropdown) -->
        <div class="form-group">
          <label>Manager Type</label>
          <div
            class="custom-dropdown"
            (click)="toggleManagerTypeDropdown($event)"
          >
            <div class="dropdown-selected">
              <span>{{ getManagerTypeLabel() }}</span>
              <i
                class="fa-solid fa-caret-down"
                [class.rotate]="isManagerTypeDropdownOpen"
              ></i>
            </div>
            <div
              class="dropdown-options"
              *ngIf="isManagerTypeDropdownOpen"
            >
              <div
                class="dropdown-option"
                (click)="selectManagerType('SELF', $event)"
              >
                Self
              </div>
              <div
                class="dropdown-option"
                (click)="selectManagerType('SELECTED', $event)"
              >
                Employee (Select manually)
              </div>
            </div>
          </div>
        </div>

        <!-- Project Manager (conditional, custom dropdown) -->
        <div class="form-group" *ngIf="managerMode === 'SELECTED'">
          <label>Project Manager</label>
          <div
            class="custom-dropdown"
            (click)="toggleEmployeeDropdown($event)"
          >
            <div class="dropdown-selected">
              <span>{{ getSelectedEmployeeName() || '-- Select Manager --' }}</span>
              <i
                class="fa-solid fa-caret-down"
                [class.rotate]="isEmployeeDropdownOpen"
              ></i>
            </div>
            <div
              class="dropdown-options"
              *ngIf="isEmployeeDropdownOpen"
            >
              <div
                class="dropdown-option"
                *ngFor="let emp of employeeList"
                (click)="selectEmployee(emp, $event)"
              >
                {{ emp.fullName }}
              </div>
            </div>
          </div>
        </div>

        <!-- Description (full width) -->
 <!-- Description (full width) -->
<div class="form-group full-width">
  <label>Remarks</label>
  <textarea
    class="form-control"
    [(ngModel)]="description"
    name="description"
            placeholder="Enter Remarks..."
  ></textarea>
</div>
      </div>

      <!-- Footer buttons -->
      <div class="form-actions">
        <button type="button" class="cancel-btn" (click)="cancel()">
          Cancel
        </button>
        <button
          type="submit"
          class="submit-btn"
          (click)="isEditMode ? updateDepartment() : createDepartment()"
        >
          {{ isEditMode ? 'Update' : 'Create' }}
        </button>
      </div>
    </form>
  </div>
</div>
