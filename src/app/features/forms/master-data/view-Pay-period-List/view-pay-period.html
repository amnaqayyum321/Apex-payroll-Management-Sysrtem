<app-master-table
  [title]="'View All Pay Periods'"
  [columns]="[
    { key: 'code', label: 'Code' },
    { key: 'name', label: 'Name' },
    { key: 'isActive', label: 'Status' },
    { key: 'startDate', label: 'Start Date' },
    { key: 'endDate', label: 'End Date' }
  ]"
  [fetchService]="formService.GetPayperiod.bind(formService)"
  [routeBase]="'/panel/forms/pay-period'"
></app-master-table>
