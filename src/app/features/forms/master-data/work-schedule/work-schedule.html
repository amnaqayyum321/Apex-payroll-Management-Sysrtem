<div class="user-form-wrapper">
  <div class="user-card">
    <!-- Header with title, active checkbox and reset button -->
  <div class="card-header d-flex justify-content-between align-items-center">
  <h3>{{ isEditMode ? 'Update Work Schedule' : 'Create Work Schedule' }}</h3>

  <button class="reset-btn" (click)="resetShiftForm()">
    <i class="fa fa-refresh"></i> Reset
  </button>
</div>
    <div class="header-divider"></div>

    <form
    
      class="user-form"
      (ngSubmit)="isEditMode ? updateWorkSchedule() : createWorkSchedule()"
    >
      <div class="active-checkbox-row">
  <label class="checkbox-container">
    Active
    <input
      type="checkbox"
      class="custom-checkbox"
      [(ngModel)]="active"
      name="active"
    />
    <span class="checkmark"></span>
  </label>
</div>
      <!-- 3‑column grid for first row -->
      <div class="form-grid">
        <!-- Pay Period custom dropdown -->
        <div class="form-group">
          <label>Pay Period</label>
          <div class="custom-dropdown"  #payPeriodDropdown (click)="togglePayPeriodDropdown($event)">
            <div class="dropdown-selected">
              <span>{{ selectedPayPeriodName || 'Select Pay Period' }}</span>
              <i
                class="fa-solid fa-caret-down"
                [class.rotate]="isPayPeriodDropdownOpen"
              ></i>
            </div>
            <div class="dropdown-options" *ngIf="isPayPeriodDropdownOpen">
              <div
                class="dropdown-option"
                *ngFor="let p of payPeriodList"
                (click)="selectPayPeriod(p, $event)"
              >
                {{ p.name }}
              </div>
            </div>
          </div>
        </div>

        <!-- Shifts dropdown & selected tags -->
      <!-- Shifts custom dropdown & selected tags -->
<div class="form-group">
  <label>Select Shifts</label>
  <div class="custom-dropdown"  #shiftDropdown (click)="toggleShiftDropdown($event)">
    <div class="dropdown-selected">
      <span>{{ selectedShiftName || 'Select Shift' }}</span>
      <i
        class="fa-solid fa-caret-down"
        [class.rotate]="isShiftDropdownOpen"
      ></i>
    </div>
    <div class="dropdown-options" *ngIf="isShiftDropdownOpen">
      <div
        class="dropdown-option"
        *ngFor="let s of shiftsList"
        (click)="selectShift(s, $event)"
      >
        {{ s.name }}
      </div>
    </div>
  </div>
  <div class="selected-shifts mt-2" *ngIf="selectedShifts.length > 0">
    <div class="shift-tag" *ngFor="let shift of selectedShifts">
      {{ shift.name }}
      <span class="remove-btn"  (click)="removeShift(shift.publicId)">✖</span>
    </div>
  </div>
</div>
      </div>

      <!-- Description full width -->
      <div class="form-grid">
        <div class="form-group" style="grid-column: span 3">
          <label>Description</label>
          <textarea
            class="form-control"
                        placeholder="Enter Remarks..."

            [(ngModel)]="remarks"
            name="remarks"
            rows="3"
          ></textarea>
        </div>
      </div>

    

      <!-- Section heading for the table -->
      <div class="section-header">
        <h4>Define Work Schedule</h4>
      </div>

      <!-- Scrollable table -->
      <div class="table-main-div">
        <table class="work-schedule-table">
          <thead>
            <tr>
              <th>Work Date</th>
              <th>Day Name</th>
              <th>Day Type</th>
              <th>Remarks</th>
            </tr>
          </thead>
          <tbody>
            <tr
              *ngFor="let day of days; let i = index; trackBy: trackByIndex"
            >
              <td>
                <input
                  type="date"
                  [(ngModel)]="day.workDate"
                  name="workDate{{ i }}"
                  class="form-control"
                  readonly
                />
              </td>
              <td>
                <select
                  class="form-control native-select"
                  [(ngModel)]="day.dayName"
                  name="dayName{{ i }}"
                >
                  <option *ngFor="let d of weekDays" [value]="d">
                    {{ d }}
                  </option>
                </select>
              </td>
              <td>
                <select
                  class="form-control native-select"
                  [(ngModel)]="day.dayType"
                  name="dayType{{ i }}"
                >
                  <option *ngFor="let type of dayTypes" [value]="type">
                    {{ type }}
                  </option>
                </select>
              </td>
              <td>
                <input
                  type="text"
                  class="form-control"
                              placeholder="Enter Remarks..."

                  [(ngModel)]="day.remarks"
                  name="remarks{{ i }}"
                />
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Form actions -->
      <div class="form-actions">
        <button type="button" class="cancel-btn" (click)="cancel()">
          Cancel
        </button>
        <button type="submit" class="submit-btn">
          {{ isEditMode ? 'Update' : 'Create' }}
        </button>
      </div>
    </form>
  </div>
</div>
