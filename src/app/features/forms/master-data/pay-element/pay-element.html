<div class="user-form-wrapper">
  <div class="user-card">
    <!-- Header -->
    <div class="card-header">
      <h3>{{ isEditMode ? 'Update Pay Element' : 'Create Pay Element' }}</h3>
    </div>
    <div class="header-divider"></div>

    <form class="user-form">
      <div class="row">
        <div class="col-12 d-flex justify-content-end align-items-center gap-4">
          <!-- Active -->
          <label class="checkbox-container">
            Active
            <input type="checkbox" class="custom-checkbox" [(ngModel)]="active" name="active" />
            <span class="checkmark"></span>
          </label>

          <!-- Taxable -->
          <label class="checkbox-container">
            Taxable
            <input type="checkbox" class="custom-checkbox" [(ngModel)]="taxable" name="taxable" />
            <span class="checkmark"></span>
          </label>
        </div>
      </div>

      <!-- ROW 1 -->
      <div class="row">
        <div class="col-md-6">
          <label class="form-label">Code</label>
          <input
            type="text"
            placeholder="Enter Code..."
            [(ngModel)]="Code"
            class="form-control"
            name="Code"
          />
        </div>
        <div class="col-md-6">
          <label class="form-label">Name</label>
          <input
            type="text"
            class="form-control"
            placeholder="Enter Name..."
            [(ngModel)]="Name"
            name="Name"
          />
        </div>
      </div>

      <!-- ROW 2: Three custom dropdowns -->
      <div class="row">
        <!-- Element Type -->
        <div class="col-md-4">
          <label class="form-label">Element Type</label>
          <div class="custom-dropdown" (click)="toggleElementType($event)">
            <div class="dropdown-selected">
              <span>{{ elementType || 'Select Element Type' }}</span>
              <i class="fa-solid fa-caret-down" [class.rotate]="isElementTypeOpen"></i>
            </div>
            <div class="dropdown-options" *ngIf="isElementTypeOpen">
              <div
                class="dropdown-option"
                *ngFor="let type of elementTypes"
                (click)="selectElementType(type, $event)"
              >
                {{ type }}
              </div>
            </div>
          </div>
        </div>

        <!-- Element Nature -->
        <div class="col-md-4">
          <label class="form-label">Element Nature</label>
          <div class="custom-dropdown" (click)="toggleElementNature($event)">
            <div class="dropdown-selected">
              <span>{{ elementNature || 'Select Element Nature' }}</span>
              <i class="fa-solid fa-caret-down" [class.rotate]="isElementNatureOpen"></i>
            </div>
            <div class="dropdown-options" *ngIf="isElementNatureOpen">
              <div
                class="dropdown-option"
                *ngFor="let nature of elementNatures"
                (click)="selectElementNature(nature, $event)"
              >
                {{ nature }}
              </div>
            </div>
          </div>
        </div>

        <!-- Element Category -->
        <div class="col-md-4">
          <label class="form-label">Element Category</label>
          <div class="custom-dropdown" (click)="toggleElementCategory($event)">
            <div class="dropdown-selected">
              <span>{{ elementCategory || 'Select Element Category' }}</span>
              <i class="fa-solid fa-caret-down" [class.rotate]="isElementCategoryOpen"></i>
            </div>
            <div class="dropdown-options" *ngIf="isElementCategoryOpen">
              <div
                class="dropdown-option"
                *ngFor="let category of elementCategories"
                (click)="selectElementCategory(category, $event)"
              >
                {{ category }}
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ROW 3: Description -->
      <div class="row">
        <div class="col-12">
          <label class="form-label">Remarks</label>
          <textarea
            type="text"
            class="form-control"
            placeholder="Enter Remarks..."
            [(ngModel)]="description"
            name="description"
          ></textarea>
        </div>
      </div>

      <!-- Footer buttons -->
      <div class="form-actions">
        <button type="button" class="cancel-btn" (click)="cancel()">Cancel</button>
        <button
          type="submit"
          class="submit-btn"
          (click)="isEditMode ? updatePayElement() : createPayElement()"
        >
          {{ isEditMode ? 'Update' : 'Create' }}
        </button>
      </div>
    </form>
  </div>
</div>
