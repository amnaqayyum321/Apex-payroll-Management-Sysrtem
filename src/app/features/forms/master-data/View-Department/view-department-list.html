<section class="container-fluid p-0">
  <!-- Header: Title + Search + Create Button (no items-per-page dropdown) -->
  <div class="d-flex justify-content-between mb-3">
    <div class="page-title">
      <i class="fa-solid fa-house"></i>
      <span style="font-weight: 700; color: #566f9e">-</span>
      <span>View All Department</span>
    </div>
    <div class="d-flex align-items-center gap-2">
      <!-- Search input -->
      <input
        type="text"
        class="form-control"
        placeholder="Search..."
        [(ngModel)]="searchTerm"
        (input)="onSearch()"
        style="width: 200px; background-color: #1e293b; border: 1px solid #334155; color: #fff;"
      />
      <!-- Create button -->
      <button class="create-btn" [routerLink]="['/panel/forms/department']">
        <i class="fa-solid fa-plus icon"></i>
        Create Department
      </button>
    </div>
  </div>

  <!-- Table section -->
  <section class="table-main-div">
    <div
      class="rounded-2xl text-gray-200 overflow-x-auto pt-4"
      [class.table-scrollable]="itemsPerPage > 7"
    >
      <table class="min-w-full text-sm border-separate border-spacing-y-2">
        <thead>
          <tr class="text-gray-400 text-left text-xs uppercase tracking-wider">
            <th class="px-3 py-2">#</th>
            <th class="px-3 py-2">Code</th>
            <th class="px-3 py-2">Name</th>
            <th class="px-3 py-2">Status</th>
            <th class="px-3 py-2">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr
            *ngFor="let dep of paginatedDepartmentList; let i = index"
            class="bg-[#1e293b] hover:bg-[#27354a] rounded-lg"
          >
            <td class="px-3 py-3 font-medium">{{ (currentPage - 1) * itemsPerPage + i + 1 }}</td>
            <td class="px-3 py-3 font-medium">{{ dep.code }}</td>
            <td class="px-3 py-3 font-medium">{{ dep.name }}</td>
            <td class="px-3 py-3 font-medium">
              <span
                class="status-badge"
                [ngClass]="dep.isActive ? 'active-badge' : 'inactive-badge'"
              >
                {{ dep.isActive ? 'Active' : 'Inactive' }}
              </span>
            </td>
            <td class="px-3 py-3 text-gray-400">
              <div ngbDropdown class="d-inline-block">
                <i
                  class="fa-solid fa-pen-to-square"
                  style="color: #4ade80; cursor: pointer"
                  title="Edit Department"
                  [routerLink]="['/panel/forms/department', dep.publicId]"
                ></i>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Footer: Rows per page + range (left) and Pagination (right) -->
    <div class="d-flex justify-content-between align-items-center mt-3 me-3">
      <!-- Left: Rows per page dropdown and range text -->
      <div class="d-flex align-items-center gap-3">
        <span class="text-gray-400" style="color: #94a3b8;">Items per page</span>
        <select
          class="form-select"
          [(ngModel)]="itemsPerPage"
          (change)="onItemsPerPageChange()"
          style="width: auto; background-color: #1e293b; border: 1px solid #334155; color: #fff;"
        >
          <option *ngFor="let opt of [7,15,25,50,100]" [value]="opt">{{ opt }}</option>
        </select>
        <span class="text-gray-400" style="color: #94a3b8;">
          {{ firstItem }} - {{ lastItem }} of {{ totalItems }} rows
        </span>
      </div>

      <!-- Right: Pagination (unchanged) -->
      <nav aria-label="Page navigation">
        <ul class="pagination">
          <li class="page-item" [class.disabled]="currentPage === 1">
            <a class="page-link" (click)="changePage(currentPage - 1)" aria-label="Previous">
              &laquo;
            </a>
          </li>
          <li
            class="page-item"
            *ngFor="let page of totalPagesArray"
            [class.active]="page === currentPage"
          >
            <a class="page-link" (click)="changePage(page)">{{ page }}</a>
          </li>
          <li class="page-item" [class.disabled]="currentPage === totalPages">
            <a class="page-link" (click)="changePage(currentPage + 1)" aria-label="Next">
              &raquo;
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </section>
</section>
