<section class="container-fluid p-0">
  <div class="d-flex justify-content-between mb-3">
    <div class="page-title">
      <i class="fa-solid fa-house"></i>
      <span style="font-weight: 700; color: #566f9e">-</span>
      <span>View All Interview</span>
    </div>
  </div>

  <section class="table-main-div">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr>
            <th>#</th>
            <th class="px-2 py-2">Panel Member</th>
            <th class="px-2 py-2">Score</th>
            <th class="px-2 py-2">Remarks</th>
          </tr>
        </thead>
        <tbody>
          <ng-container *ngFor="let interview of InterviewFeedbackList; let i = index">
            <!-- Main Row -->
            <tr>
              <td>{{ (currentPage - 1) * itemsPerPage + i + 1 }}</td>
              <td>{{ interview.panelMemberName }}</td>
              <td>{{ interview.score }}</td>

              <td>{{ interview.remarks }}</td>
            </tr>
          </ng-container>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="d-flex justify-content-end mt-3 me-3">
      <nav aria-label="Page navigation">
        <ul class="pagination">
          <li class="page-item" [class.disabled]="currentPage === 1">
            <a class="page-link" (click)="changePage(currentPage - 1)">&laquo;</a>
          </li>
          <li
            class="page-item"
            *ngFor="let page of totalPagesArray"
            [class.active]="page === currentPage"
          >
            <a class="page-link" (click)="changePage(page)">{{ page }}</a>
          </li>
          <li class="page-item" [class.disabled]="currentPage === totalPages">
            <a class="page-link" (click)="changePage(currentPage + 1)">&raquo;</a>
          </li>
        </ul>
      </nav>
    </div>
  </section>
</section>
