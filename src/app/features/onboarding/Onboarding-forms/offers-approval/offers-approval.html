<section class="container-fluid p-0">
      <div class="d-flex justify-content-between mb-3">
    <div class="page-title">
      <i class="fa-solid fa-house"></i>
      <span style="font-weight: 700; color: #566f9e">-</span>
      <span>View All Requsitions Status</span>
    </div>
      <!-- Filters + Create Button -->
    <div class="d-flex align-items-end gap-2">
      <!-- Search -->
      <div class="search-wrapper">
        <div class="search-note">*Search by Name or Code</div>
        <div class="search-box">
          <input type="text" placeholder="Search here" [(ngModel)]="searchTerm" (input)="onSearch()" />
          <i class="fa fa-search"></i>
        </div>
      </div>

      <!-- Status Filter -->
      <div class="search-wrapper">
        <div class="search-note">*Filter by Status</div>
        <div class="filter-select-box">
          <select [(ngModel)]="statusFilter" (change)="onStatusChange()" class="filter-select">
            <option value="">All</option>
            <option value="SCHEDULED">Scheduled</option>
            <option value="IN_PROGRESS">In Progress</option>
            <option value="COMPLETED">Completed</option>
            <option value="PASS">Pass</option>
            <option value="FAIL">Fail</option>
            <option value="CANCELLED">Cancelled</option>
          </select>
          <i class="fa-solid fa-chevron-down select-icon"></i>
        </div>
      </div>

      <!-- Reset Button -->
      <div class="mb-1">
        <button class="reset-btn" (click)="resetFilters()" title="Reset All Filters" [disabled]="!isAnyFilterActive">
          <i class="fa-solid fa-rotate-left"></i>
        </button>
      </div>


    </div>
     </div>
      <section class="table-main-div">
    <div class="rounded-2xl text-gray-200 overflow-x-auto pt-4"></div>

  <table class="min-w-full text-sm border-separate border-spacing-y-2">
    <thead>
      <tr class="text-gray-400 text-left text-xs uppercase tracking-wider">
        <th class="px-3 py-2">Code</th>
        <th class="px-3 py-2">Name</th>
        <th class="px-3 py-2">Status</th>
        <th class="px-3 py-2">Update Status</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let req of offerList" class="bg-[#1e293b] hover:bg-[#27354a] rounded-lg">
        <td class="px-3 py-3 font-medium">{{ req.code }}</td>
        <td class="px-3 py-3 font-medium">{{ req.name }}</td>
       <td class="px-3 py-3 font-medium">
<span
  class="status-badge"
  [ngClass]="{
    'draft-badge': req.status === 'DRAFT',
    'pending-badge': req.status === 'PENDING_APPROVAL',
    'approved-badge': req.status === 'APPROVED',
    'sent-badge': req.status === 'SENT',
    'accepted-badge': req.status === 'ACCEPTED',
    'declined-badge': req.status === 'DECLINED',
    'expired-badge': req.status === 'EXPIRED',
    'withdrawn-badge': req.status === 'WITHDRAWN'
  }"
>
  {{ req.status }}
</span>
</td>
        <td class="px-3 py-3 font-medium">
   <button class="btn btn-success btn-sm fixed-btn"
        (click)="openApprovalModal(req)"
        [disabled]="OFFER_STATUS_FLOW[req.status]?.length === 0"
        [ngClass]="{
          'btn-success': OFFER_STATUS_FLOW[req.status]?.length !== 0,
          'btn-secondary':OFFER_STATUS_FLOW[req.status]?.length === 0
        }">

  {{ OFFER_STATUS_FLOW[req.status]?.length === 0 ? 'Updated' : 'Update' }}

</button>
        </td>
      </tr>
    </tbody>
  </table>

    
    <!-- Footer -->
    <div class="table-footer d-flex justify-content-between align-items-center mt-3">
      <div class="table-info">
        <span class="label">Items per page</span>
        <div class="items-select">
          <select [(ngModel)]="itemsPerPage" (change)="onItemsPerPageChange()">
            <option *ngFor="let opt of [7, 15, 25, 50, 100]" [value]="opt">{{ opt }}</option>
          </select>
        </div>
        <span class="rows-count">
          {{ firstItem }} - {{ lastItem }} of {{ totalItems }} Departments
        </span>
      </div>

      <div class="d-flex justify-content-end mt-3 me-3">
        <nav aria-label="Page navigation">
          <ul class="pagination">
            <li class="page-item" [class.disabled]="currentPage === 1">
              <a class="page-link" (click)="changePage(currentPage - 1)">&laquo;</a>
            </li>
            <li class="page-item" *ngFor="let page of totalPagesArray" [class.active]="page === currentPage">
              <a class="page-link" (click)="changePage(page)">{{ page }}</a>
            </li>
            <li class="page-item" [class.disabled]="currentPage === totalPages">
              <a class="page-link" (click)="changePage(currentPage + 1)">&raquo;</a>
            </li>
          </ul>
        </nav>
      </div>
    </div>

</section>

<!-- MODAL -->
<div class="custom-modal" *ngIf="showModal">
  <div class="modal-content">

    <h5>Update Status</h5>

    <!-- Breadcrumb UI -->
    <div class="breadcrumb-container">
      <div
        *ngFor="let step of getBreadcrumbs(selectedOffer?.status)"
        class="breadcrumb-step active">
        {{ step }}
      </div>
    </div>

    <!-- Dropdown -->
    <select class="form-select mt-3" [(ngModel)]="selectedStatus">
      <option value="">Update Status</option>
      <option *ngFor="let status of allowedStatuses" [value]="status">
        {{ status }}
      </option>
    </select>

    <div class="mt-3 text-end">
      <button class="btn btn-secondary me-2" (click)="closeModal()">Cancel</button>
      <button class="btn btn-primary" (click)="updateStatus()">Update</button>
    </div>

  </div>
</div>
