<section class="container-fluid p-0">
      <div class="d-flex justify-content-between mb-3">
    <div class="page-title">
      <i class="fa-solid fa-house"></i>
      <span style="font-weight: 700; color: #566f9e">-</span>
      <span>View All Candidates Status</span>
    </div>
       <!-- Filters + Create Button -->
    <div class="d-flex align-items-end gap-2">
      <!-- Search -->
      <div class="search-wrapper">
        <div class="search-note">*Search by Name or Code</div>
        <div class="search-box">
          <input
            type="text"
            placeholder="Search here"
            [(ngModel)]="searchTerm"
            (input)="onSearch()"
          />
          <i class="fa fa-search"></i>
        </div>
      </div>

      <!-- Status Filter -->
      <div class="search-wrapper">
        <div class="search-note">*Filter by Status</div>
        <div class="filter-select-box">
          <select [(ngModel)]="statusFilter" (change)="onStatusChange()" class="filter-select">
       <option value="">All</option>
  <option value="APPLIED">Applied</option>
  <option value="SHORTLISTED">Shortlisted</option>
  <option value="INTERVIEW_SCHEDULED">Interview Scheduled</option>
  <option value="INTERVIEWED">Interviewed</option>
  <option value="SELECTED">Selected</option>
  <option value="FINAL_SCREENING">Final Screening</option>
  <option value="OFFER_MADE">Offer Made</option>
  <option value="HIRED">Hired</option>
  <option value="REJECTED">Rejected</option>
  <option value="OFFER_EXPIRED">Offer Expired</option>
  <option value="WITHDRAWN">Withdrawn</option>
          </select>
          <i class="fa-solid fa-chevron-down select-icon"></i>
        </div>
      </div>

      <!-- Reset Button -->
      <div class="mb-1">
        <button
          class="reset-btn"
          (click)="resetFilters()"
          title="Reset All Filters"
          [disabled]="!isAnyFilterActive"
        >
          <i class="fa-solid fa-rotate-left"></i>
        </button>
      </div>

     
    </div>
     </div>
      <section class="table-main-div">
    <div class="rounded-2xl text-gray-200 overflow-x-auto pt-4"></div>

  <table class="min-w-full text-sm border-separate border-spacing-y-2">
    <thead>
      <tr class="text-gray-400 text-left text-xs uppercase tracking-wider">
        <th class="px-3 py-2">Code</th>
        <th class="px-3 py-2">Name</th>
        <th class="px-3 py-2">Status</th>
        <th class="px-3 py-2">Update Status</th>
      </tr>
    </thead>
    <tbody>
    <tr *ngFor="let app of applicationList">
  <td  class="px-3 py-3 font-medium">{{ app.code }}</td>
  <td  class="px-3 py-3 font-medium">{{ app.candidateName }}</td>
  <td  class="px-3 py-3 font-medium">
 <span
  class="status-badge"
  [ngClass]="{
    'applied-badge': app.status === 'APPLIED',
    'shortlisted-badge': app.status === 'SHORTLISTED',
    'interview-scheduled-badge': app.status === 'INTERVIEW_SCHEDULED',
    'interviewed-badge': app.status === 'INTERVIEWED',
    'selected-badge': app.status === 'SELECTED',
    'final-screening-badge': app.status === 'FINAL_SCREENING',
    'offer-made-badge': app.status === 'OFFER_MADE',
    'hired-badge': app.status === 'HIRED',
    'rejected-badge': app.status === 'REJECTED',
    'offer-expired-badge': app.status === 'OFFER_EXPIRED',
    'withdrawn-badge': app.status === 'WITHDRAWN'
  }"
>
  {{ app.status }}
</span>
  </td>

  <td>
    <button class="btn btn-success btn-sm"
      (click)="openStatusModal(app)"
      [disabled]="APPLICATION_STATUS_FLOW[app.status]?.length === 0">
      {{ APPLICATION_STATUS_FLOW[app.status]?.length === 0 ? 'Updated' : 'Update' }}
    </button>
  </td>
</tr>
    </tbody>
  </table>

        <!-- Footer -->
    <div class="table-footer d-flex justify-content-between align-items-center mt-3">
      <div class="table-info">
        <span class="label">Items per page</span>
        <div class="items-select">
          <select [(ngModel)]="itemsPerPage" (change)="onItemsPerPageChange()">
            <option *ngFor="let opt of [7, 15, 25, 50, 100]" [value]="opt">{{ opt }}</option>
          </select>
        </div>
        <span class="rows-count">
          {{ firstItem }} - {{ lastItem }} of {{ totalItems }} Departments
        </span>
      </div>

      <div class="d-flex justify-content-end mt-3 me-3">
        <nav aria-label="Page navigation">
          <ul class="pagination">
            <li class="page-item" [class.disabled]="currentPage === 1">
              <a class="page-link" (click)="changePage(currentPage - 1)">&laquo;</a>
            </li>
            <li
              class="page-item"
              *ngFor="let page of totalPagesArray"
              [class.active]="page === currentPage"
            >
              <a class="page-link" (click)="changePage(page)">{{ page }}</a>
            </li>
            <li class="page-item" [class.disabled]="currentPage === totalPages">
              <a class="page-link" (click)="changePage(currentPage + 1)">&raquo;</a>
            </li>
          </ul>
        </nav>
      </div>
    </div>

</section>

<!-- MODAL -->
<div class="custom-modal" *ngIf="showModal">
  <div class="modal-content">

    <h5>Update Status</h5>

    <!-- Breadcrumb UI -->
    <div class="breadcrumb-container">
      <div
       *ngFor="let step of getApplicationBreadcrumbs(selectedApp?.status)"
        class="breadcrumb-step active">
        {{ step }}
      </div>
    </div>

    <!-- Dropdown -->
    <select class="form-select mt-3" [(ngModel)]="selectedStatus">
      <option value="">Update Status</option>
      <option *ngFor="let status of allowedStatuses" [value]="status">
        {{ status }}
      </option>
    </select>

    <div class="mt-3 text-end">
      <button class="btn btn-secondary me-2" (click)="closeModal()">Cancel</button>
      <button class="btn btn-primary" (click)="updateApplicationStatus()">Update</button>
    </div>

  </div>
</div>
