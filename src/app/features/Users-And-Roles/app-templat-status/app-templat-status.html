<div class="table-main-div">
  <!-- Header -->
  <div class="d-flex align-items-center justify-content-between p-3">
    <h5 style="color: var(--white-color-1); margin: 0; font-weight: 600">Approval Templates</h5>
    <div class="d-flex align-items-center gap-2">
      <div class="status-filter-wrapper">
        <select
          class="status-filter-select"
          [(ngModel)]="selectedStatus"
          (ngModelChange)="applyFilter()"
        >
          <option value="">All Status</option>
          <option value="DRAFT">DRAFT</option>
          <option value="ACTIVE">ACTIVE</option>
        </select>
      </div>
      <button class="reset-filter-btn" (click)="resetFilter()" title="Reset Filter">
        <i class="fa fa-refresh"></i>
      </button>
    </div>
  </div>

  <div class="header-divider"></div>

  <!-- Table -->
  <div class="table-scrollable">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Code</th>
          <th>Name</th>
          <th>Entity</th>
          <th>Stages</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngIf="filteredList.length === 0">
          <td colspan="7" class="not-found">No templates found.</td>
        </tr>
        <tr *ngFor="let t of filteredList; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ t.code }}</td>
          <td>{{ t.name }}</td>
          <td>{{ t.entityName }}</td>
          <td>
            <span class="stage-count-badge"> {{ t.stages?.length ?? 0 }} Stages </span>
          </td>
          <td>
            <span class="status-badge" [ngClass]="getStatusClass(t.status)">
              {{ t.status }}
            </span>
          </td>
       <td>
  <div class="toggle-switch" (click)="toggleStatus(t)">
    <div class="toggle-track" [class.active]="t.status === 'ACTIVE'">
      <div class="toggle-thumb"></div>
    </div>
  </div>
</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ✅ Activation Modal -->
<div class="modal-overlay" *ngIf="showModal" (click)="closeModal()">
  <div class="modal-box" (click)="$event.stopPropagation()">
    <!-- Modal Header -->
    <div class="modal-header-custom">
      <h6>Activate Template</h6>
      <button class="modal-close-btn" (click)="closeModal()">
        <i class="fa fa-times"></i>
      </button>
    </div>

    <!-- Template Info -->
    <div class="modal-template-info" *ngIf="selectedTemplate">
      <span class="info-label">Template:</span>
      <span class="info-value">{{ selectedTemplate.name }}</span>
    </div>

    <div class="modal-divider"></div>

    <!-- Resolution Mode Selection -->
    <p class="modal-section-label">Select Activation Mode</p>

    <div class="resolution-options">
      <label
        class="resolution-option"
        *ngFor="let mode of resolutionModes"
        [class.selected]="selectedResolutionMode === mode.value"
        (click)="selectedResolutionMode = mode.value"
      >
        <div class="option-radio">
          <div class="radio-dot" [class.active]="selectedResolutionMode === mode.value"></div>
        </div>
        <div class="option-content">
          <span class="option-label">{{ mode.label }}</span>
          <span class="option-desc">{{ mode.description }}</span>
        </div>
      </label>
    </div>

    <!-- Dry Run Toggle (only for conflict modes) -->
    <div class="dry-run-toggle" *ngIf="selectedResolutionMode !== 'ACTIVE'">
      <label class="toggle-label">
        <input type="checkbox" [(ngModel)]="dryRun" />
        <!-- <span class="toggle-text">Dry Run <small>(preview changes without applying)</small></span> -->
      </label>
    </div>

    <!-- Modal Footer -->
    <div class="modal-footer-custom">
      <button class="cancel-modal-btn" (click)="closeModal()">Cancel</button>
      <button class="confirm-modal-btn" (click)="confirmActivation()">
        <i class="fa fa-check"></i> Confirm
      </button>
    </div>
  </div>
</div>
